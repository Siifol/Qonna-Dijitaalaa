<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Weather Forecast</title>
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">🌤️ Weather</div>
        <a href="index.html" class="btn-dash">Home</a>
    </div>

    <div class="container" style="text-align: center;">
        <h2>Local Weather</h2>
        <input type="text" id="cityInput" placeholder="Enter city name (e.g., Addis Ababa)">
        <button onclick="getWeather()">Get Forecast</button>

        <div id="weatherResult" style="margin-top: 20px;">
            <h3 id="cityName"></h3>
            <p id="temp"></p>
            <p id="desc"></p>
        </div>
    </div>

    <script src="weather-script.js"></script>
</body>
</html>
