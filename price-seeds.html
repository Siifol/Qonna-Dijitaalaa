<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Seeds - Qonna Dijitaalawaa Shaggar</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .search-bar { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #2E7D32; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .seed-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .seed-info h4 { margin: 0; color: #2E7D32; }
        .seed-info p { margin: 0; font-size: 13px; color: #666; }
        .price-tag { font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-brand">🌱 Qonna Dijitaalawaa Shaggar</div>
        <a href="market-prices.html" class="btn-dash">Back</a>
    </div>

    <div class="container">
        <h2>Seed Registry</h2>
        <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Search seeds (e.g. Teff, Wheat)...">
        
        <div id="seedListContainer">
            <!-- JavaScript will inject seeds here -->
        </div>
    </div>

    <script src="seed-data.js"></script>
    <script>
        const searchInput = document.getElementById('searchInput');
        const container = document.getElementById('seedListContainer');

        function renderSeeds(filter = '') {
            container.innerHTML = ''; // Clear current
            const filtered = seedsDB.filter(s => s.name.toLowerCase().includes(filter.toLowerCase()));
            
            filtered.forEach(seed => {
                const div = document.createElement('div');
                div.className = 'seed-card';
                div.innerHTML = `
                    <div class="seed-info">
                        <h4>${seed.name}</h4>
                        <p>Standard quality</p>
                    </div>
                    <div class="price-tag">${seed.price} ETB</div>
                    <button class="action-btn" onclick="alert('Ordering ${seed.name}')">Buy/Sell</button>
                `;
                container.appendChild(div);
            });
        }

        searchInput.addEventListener('input', (e) => renderSeeds(e.target.value));
        renderSeeds(); // Initial render
    </script>
</body>
</html>
